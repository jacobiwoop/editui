<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Picker — Liquid Glass Toolbar (prototype)</title>
<style>
  :root {
    --glass-bg: rgba(20, 20, 20, 0.6);
    --glass-popover: rgba(30, 30, 30, 0.75);
    --glass-input: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
    --glass-hover: rgba(255, 255, 255, 0.12);
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.6);
    --accent-color: #6c5ce7;
    --accent-gradient: linear-gradient(135deg, #6c5ce7, #a29bfe);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070') no-repeat center center fixed;
    background-size: cover;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 100px;
    padding-bottom: 140px;   /* laisse de la place pour la toolbar fixée en bas */
    min-height: 100vh;
    color: var(--text-primary);
  }

  /* --- Élément démo --- */
  .demo-stage { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 48px; }
  .demo-hint {
    font-size: 12px; color: var(--text-secondary);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6); letter-spacing: 0.5px;
  }
  #target-element {
    background: #6c5ce7; color: #fff;
    border: 2px solid #fff; border-radius: 8px;
    padding: 10px 24px; font-size: 16px; font-weight: bold;
    font-family: Inter, sans-serif; cursor: default; outline: none;
    transition: box-shadow 0.2s ease;
  }
  #target-element.selected {
    box-shadow: 0 0 0 3px rgba(108,92,231,0.6), 0 8px 30px rgba(0,0,0,0.4);
  }

  /* --- Toolbar (fixée en bas de l'écran, centrée) --- */
  .toolbar {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
    position: fixed;         /* reste collée en bas */
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    height: 52px;
    z-index: 200;
  }
  .separator { width: 1px; height: 28px; background: var(--glass-border); margin: 0 8px; }

  .toolbar.collapsed {
    padding: 8px;
    cursor: grab;
    left: auto;
    transform: none;
  }
  .toolbar.collapsed:active { cursor: grabbing; }
  .toolbar-collapsible { display: contents; }
  .toolbar.collapsed .toolbar-collapsible { display: none; }

  .tbtn {
    background: transparent; border: none; color: var(--text-primary);
    width: 36px; height: 36px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; transition: all 0.2s ease; font-size: 14px;
  }
  .tbtn:hover { background: var(--glass-hover); box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); }
  /* État "actif" : maintenu au clic, légèrement plus accentué que le hover */
  .tbtn.active {
    background: rgba(108, 92, 231, 0.35);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.15), 0 0 0 1px rgba(108,92,231,0.5);
    color: #fff;
  }
  .tbtn svg { width: 20px; height: 20px; fill: currentColor; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }

  .tbtn-logo { background: var(--accent-gradient); box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
  .tbtn-prompt {
    width: auto; padding: 0 20px; border-radius: 14px; color: #fff;
    background: var(--accent-gradient); box-shadow: 0 4px 15px rgba(108,92,231,0.3); gap: 8px;
  }
  .tbtn-prompt svg { width: 18px; height: 18px; }

  /* --- Popover (s'ouvre VERS LE HAUT, au-dessus de la toolbar) --- */
  .popover {
    position: absolute;
    bottom: 64px;            /* au-dessus de la toolbar */
    background: var(--glass-popover);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    box-shadow: 0 -15px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
    padding: 20px; width: 260px; display: none; z-index: 100;
  }
  .popover.visible { display: block; animation: popIn 0.2s ease-out forwards; }
  @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Queue (flèche) qui pointe vers le bas, sous le popover */
  .popover::before {
    content: ''; position: absolute; bottom: -6px;
    left: var(--arrow-left, 24px);
    width: 14px; height: 14px; background: var(--glass-popover);
    transform: rotate(45deg);
    border-right: 1px solid var(--glass-border);
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(30px);
  }

  .pop-title {
    font-size: 11px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; font-weight: 600;
  }
  .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .input-row { display: flex; align-items: center; gap: 10px; }
  .lbl { font-size: 12px; color: var(--text-secondary); width: 60px; }

  input[type="text"], input[type="number"], select {
    background: var(--glass-input); border: 1px solid var(--glass-border);
    color: var(--text-primary); padding: 8px 10px; border-radius: 8px;
    width: 100%; font-size: 13px; outline: none; transition: 0.2s;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: var(--accent-color); background: rgba(108,92,231,0.1);
  }
  input[type="range"] { width: 100%; accent-color: var(--accent-color); }

  .btn {
    background: var(--glass-input); border: 1px solid var(--glass-border);
    color: var(--text-primary); padding: 8px 14px; border-radius: 10px;
    cursor: pointer; font-size: 12px; text-align: center; transition: 0.2s;
  }
  .btn:hover { background: var(--glass-hover); }
  .btn-accent { background: var(--accent-gradient); border: none; box-shadow: 0 4px 15px rgba(108,92,231,0.3); }
  .btn-full { width: 100%; }

  .color-swatch-wrap {
    position: relative;
    width: 28px; height: 28px; min-width: 28px; flex-shrink: 0;
  }
  .color-swatch {
    width: 100%; height: 100%; border-radius: 8px;
    border: 1px solid var(--glass-border); cursor: pointer;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
  }
  .color-swatch-wrap input[type="color"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
    border: none; padding: 0;
  }

  /* Box model */
  .box-model {
    background: rgba(231,76,60,0.2); border: 1px solid rgba(231,76,60,0.4);
    padding: 24px; border-radius: 8px; position: relative; text-align: center;
    color: #fff; font-size: 10px; cursor: pointer;
  }
  .box-padding {
    background: rgba(241,196,15,0.2); border: 1px solid rgba(241,196,15,0.4);
    padding: 24px; border-radius: 6px; position: relative;
  }
  .box-element {
    background: rgba(46,204,113,0.2); border: 1px solid rgba(46,204,113,0.4);
    height: 40px; border-radius: 4px; display: flex; align-items: center;
    justify-content: center; color: #fff; font-weight: bold;
  }
  .box-label { position: absolute; font-size: 10px; opacity: 0.85; font-weight: bold; cursor: pointer; }
  .box-label:hover { opacity: 1; text-decoration: underline dotted; }
  .box-label input {
    width: 44px; font-size: 10px; font-weight: bold; font-family: inherit;
    background: rgba(0,0,0,0.5); border: 1px solid var(--accent-color);
    color: #fff; border-radius: 4px; padding: 1px 3px; text-align: center; outline: none;
  }
  .val-top   { top: 6px; left: 50%; transform: translateX(-50%); }
  .val-bot   { bottom: 6px; left: 50%; transform: translateX(-50%); }
  .val-left  { left: 6px; top: 50%; transform: translateY(-50%); }
  .val-right { right: 6px; top: 50%; transform: translateY(-50%); }

  /* Text screens */
  .screen { display: none; }
  .screen.active { display: block; }
  .style-toggles { display: flex; gap: 6px; margin-bottom: 16px; }
  .toggle-btn {
    width: 36px; height: 36px; background: var(--glass-input);
    border: 1px solid var(--glass-border); color: #fff; border-radius: 10px;
    cursor: pointer; font-weight: bold; transition: 0.2s;
  }
  .toggle-btn.selected { background: var(--accent-color); border-color: var(--accent-color); box-shadow: 0 2px 10px rgba(108,92,231,0.4); }
  .popover-back {
    position: absolute; top: 20px; left: 20px; background: transparent;
    border: none; color: var(--text-primary); cursor: pointer; font-size: 12px;
    display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px;
  }
  .popover-back:hover { background: var(--glass-hover); }

  /* Prompt panel */
  #popover-prompt { width: 420px; right: 0; }
  .toggle-switch {
    display: inline-flex; background: var(--glass-input); border-radius: 12px;
    padding: 3px; margin-bottom: 16px; border: 1px solid var(--glass-border);
  }
  .toggle-switch button {
    background: transparent; border: none; color: var(--text-secondary);
    padding: 6px 16px; border-radius: 9px; cursor: pointer; font-size: 12px;
    font-weight: 500; transition: 0.2s;
  }
  .toggle-switch button.active { background: var(--accent-gradient); color: #fff; box-shadow: 0 2px 8px rgba(108,92,231,0.4); }
  .code-block {
    background: rgba(0,0,0,0.4); padding: 16px; border-radius: 12px;
    font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px;
    color: #2ecc71; white-space: pre-wrap; height: 180px; overflow-y: auto;
    border: 1px solid var(--glass-border); margin-bottom: 16px;
  }

  .radius-advanced { display: none; flex-direction: column; gap: 8px; padding: 12px; background: var(--glass-input); border-radius: 10px; border: 1px solid var(--glass-border); }
  .radius-advanced.visible { display: flex; }
  .advanced-toggle { font-size: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .advanced-toggle input { width: auto; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--glass-hover); border-radius: 3px; }
</style>
</head>
<body>

<div class="demo-stage">
  <span class="demo-hint">Élément sélectionné — modifiez-le via la toolbar ci-dessous ↓</span>
  <button id="target-element">Bouton de démo</button>
</div>

<div class="toolbar">

  <!-- LOGO — toggle collapse + drag quand fermé -->
  <button class="tbtn tbtn-logo" id="btn-logo" title="Ouvrir / Fermer">
    <svg viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </button>
  <div class="toolbar-collapsible">
  <div class="separator"></div>

  <!-- BACKGROUND -->
  <button class="tbtn" onclick="event.stopPropagation(); togglePanel('popover-bg', this)" title="Background">
    <svg viewBox="0 0 24 24"><path d="M19 11h-1.7l-1.4 1.4h2.1v6h-6v-2.1l-1.4 1.4V19H5v-6h2.1L5.7 11.6H4v6.4c0 .6.4 1 1 1h6v3h2v-3h6c.6 0 1-.4 1-1V19h-1zM12 6.5L5.5 13l1.4 1.4L12 9.4l5.1 5L18.5 13 12 6.5z"/></svg>
  </button>
  <div id="popover-bg" class="popover">
    <div class="pop-title">Background</div>
    <div class="input-group">
      <div class="input-row">
        <span class="lbl">Couleur</span>
        <input type="text" id="bg-color" value="#6c5ce7" oninput="syncSwatch('bg-swatch', this.value); applyBg();">
        <div class="color-swatch-wrap">
          <div class="color-swatch" id="bg-swatch" style="background:#6c5ce7"></div>
          <input type="color" value="#6c5ce7" oninput="syncColorInput('bg-color', 'bg-swatch', this.value); applyBg();">
        </div>
      </div>
      <div class="input-row">
        <span class="lbl">Opacity</span>
        <input type="range" min="0" max="100" value="100" oninput="applyBg()">
      </div>
    </div>
  </div>

  <!-- BORDER -->
  <button class="tbtn" onclick="event.stopPropagation(); togglePanel('popover-border', this)" title="Border">
    <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5zm2 2h10v10H7V7zm2 2v6h6V9H9z"/></svg>
  </button>
  <div id="popover-border" class="popover">
    <div class="pop-title">Border</div>
    <div class="input-group">
      <div class="input-row"><span class="lbl">Stroke</span><input type="number" value="2" oninput="applyBorder()"></div>
      <div class="input-row"><span class="lbl">Style</span>
        <select onchange="applyBorder()"><option>solid</option><option>dashed</option><option>dotted</option></select>
      </div>
      <div class="input-row"><span class="lbl">Radius</span><input type="number" id="radius-global" value="8" oninput="applyBorder()"></div>
      <div class="input-row">
        <label class="advanced-toggle">
          <input type="checkbox" onclick="toggleAdvancedRadius()"> Activer coins avancés
        </label>
      </div>
      <div id="radius-advanced" class="radius-advanced">
        <div class="input-row"><span class="lbl">Top L</span><input type="number" value="8" oninput="applyBorder()"></div>
        <div class="input-row"><span class="lbl">Top R</span><input type="number" value="8" oninput="applyBorder()"></div>
        <div class="input-row"><span class="lbl">Bot R</span><input type="number" value="8" oninput="applyBorder()"></div>
        <div class="input-row"><span class="lbl">Bot L</span><input type="number" value="8" oninput="applyBorder()"></div>
      </div>
      <div class="input-row">
        <span class="lbl">Color</span>
        <input type="text" id="bd-color" value="#ffffff" oninput="syncSwatch('bd-swatch', this.value); applyBorder()">
        <div class="color-swatch-wrap">
          <div class="color-swatch" id="bd-swatch" style="background:#ffffff"></div>
          <input type="color" value="#ffffff" oninput="syncColorInput('bd-color', 'bd-swatch', this.value); applyBorder();">
        </div>
      </div>
    </div>
  </div>

  <!-- TEXT -->
  <button class="tbtn" onclick="event.stopPropagation(); togglePanel('popover-text', this)" title="Texte">
    <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
  </button>
  <div id="popover-text" class="popover">
    <div id="text-screen-1" class="screen active">
      <div class="pop-title">Propriétés du texte</div>
      <div class="input-group"><select onchange="applyText()"><option>Inter</option><option>Roboto</option><option>Arial</option><option>Georgia</option></select></div>
      <div class="style-toggles">
        <button class="toggle-btn selected" style="font-weight:bold;">B</button>
        <button class="toggle-btn" style="font-style:italic;">I</button>
        <button class="toggle-btn" style="text-decoration:underline;">U</button>
        <button class="toggle-btn" style="text-decoration:line-through;">S</button>
      </div>
      <div class="input-group">
        <div class="input-row">
          <span class="lbl">Size</span><input type="number" value="16" oninput="applyText()">
          <span class="lbl">Line</span><input type="number" value="24" oninput="applyText()">
        </div>
      </div>
      <div class="input-row">
        <span class="lbl">Couleur</span>
        <input type="text" id="tx-color" value="#ffffff" oninput="syncSwatch('tx-swatch', this.value); applyText()">
        <div class="color-swatch-wrap">
          <div class="color-swatch" id="tx-swatch" style="background:#ffffff"></div>
          <input type="color" value="#ffffff" oninput="syncColorInput('tx-color', 'tx-swatch', this.value); applyText();">
        </div>
      </div>
    </div>
  </div>

  <!-- SPACING -->
  <button class="tbtn" onclick="event.stopPropagation(); togglePanel('popover-spacing', this)" title="Espacement">
    <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5zm2 2h10v10H7V7z M9 9h6v6H9z"/></svg>
  </button>
  <div id="popover-spacing" class="popover">
    <div class="pop-title">Box Model</div>
    <div class="box-model">
      <span class="box-label val-top"  data-prop="marginTop"    onclick="editSpacing(this)">10px</span>
      <span class="box-label val-bot"  data-prop="marginBottom" onclick="editSpacing(this)">10px</span>
      <span class="box-label val-left" data-prop="marginLeft"   onclick="editSpacing(this)">10px</span>
      <span class="box-label val-right"data-prop="marginRight"  onclick="editSpacing(this)">10px</span>
      <div class="box-padding">
        <span class="box-label val-top"  data-prop="paddingTop"    onclick="editSpacing(this)">10px</span>
        <span class="box-label val-bot"  data-prop="paddingBottom" onclick="editSpacing(this)">10px</span>
        <span class="box-label val-left" data-prop="paddingLeft"   onclick="editSpacing(this)">24px</span>
        <span class="box-label val-right"data-prop="paddingRight"  onclick="editSpacing(this)">24px</span>
        <div class="box-element">Élément</div>
      </div>
    </div>
  </div>

  <!-- SIZE -->
  <button class="tbtn" onclick="event.stopPropagation(); togglePanel('popover-size', this)" title="Taille">
    <svg viewBox="0 0 24 24"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z"/></svg>
  </button>
  <div id="popover-size" class="popover">
    <div class="pop-title">Size</div>
    <div class="input-group">
      <div class="input-row"><span class="lbl">Width</span><input type="number" value="120" oninput="applySize()"></div>
      <div class="input-row"><span class="lbl">Height</span><input type="number" value="40" oninput="applySize()"></div>
    </div>
  </div>

  <!-- NOTE -->
  <button class="tbtn" onclick="event.stopPropagation(); togglePanel('popover-note', this)" title="Note">
    <svg viewBox="0 0 24 24"><path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H9l-6-6V5zm2 0v12.17L9.83 21H19V5H5zm3 4h8v2H8V9zm0 4h5v2H8v-2z"/></svg>
  </button>
  <div id="popover-note" class="popover" style="width:300px">
    <div class="pop-title">Note</div>
    <textarea id="note-input" placeholder="Écrivez votre note ici…"
      style="width:100%; height:140px; background:var(--glass-input); border:1px solid var(--glass-border);
             color:var(--text-primary); border-radius:10px; padding:10px; font-size:13px;
             font-family:inherit; resize:vertical; outline:none; line-height:1.5;"
      oninput="this.style.borderColor=this.value?'var(--accent-color)':'var(--glass-border)'"
    ></textarea>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="btn btn-accent" style="flex:1" onclick="copyNote()">Copier</button>
      <button class="btn" onclick="document.getElementById('note-input').value=''; this.closest('.popover').querySelector('textarea').style.borderColor='var(--glass-border)'">Effacer</button>
    </div>
  </div>

  <div class="separator"></div>

  <!-- UNDO -->
  <button class="tbtn" onclick="closeAllPopovers(); flashHint(this, '↶ Undo')" title="Annuler">
    <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
  </button>

  <!-- CLEAR -->
  <button class="tbtn" onclick="closeAllPopovers(); clearAll()" title="Réinitialiser">
    <svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 0 1-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0M4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l3.53-3.53l-4.95-4.95l-4.95 4.95Z"/></svg>
  </button>

  <div class="separator"></div>

  <!-- PROMPT -->
  <button class="tbtn tbtn-prompt" onclick="event.stopPropagation(); togglePanel('popover-prompt', this)">
    <svg viewBox="0 0 24 24"><path d="M9 2h6c1.1 0 2 .9 2 2v1h3c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H2c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2h3V4c0-1.1.9-2 2-2m6 4V4H9v2h6Z"/></svg>
    Prompt
  </button>

  <div id="popover-prompt" class="popover">
    <div class="toggle-switch">
      <button class="active" onclick="switchPromptFormat('json', this)">JSON</button>
      <button onclick="switchPromptFormat('md', this)">Markdown</button>
    </div>
    <div id="prompt-content" class="code-block"></div>
    <button class="btn btn-accent btn-full" id="btn-copy-prompt" onclick="copyPrompt()">Copier le Prompt</button>
  </div>

  </div><!-- /toolbar-collapsible -->
</div>

<script>
  // --- État mocké (source unique du prompt généré) ---
  const elementState = {
    selector: "button.launcher-button",
    background: { color: "#6c5ce7", opacity: 100 },
    border: { width: 2, style: "solid", radius: 8, color: "#ffffff" },
    text: { font: "Inter", size: 16, weight: "bold", color: "#ffffff" },
    size: { width: 120, height: 40 }
  };

  const target = document.getElementById('target-element');
  target.classList.add('selected');

  // --- Popovers ---
  function togglePanel(id, btn) {
    const popover = document.getElementById(id);
    const wasVisible = popover.classList.contains('visible');
    closeAllPopovers();
    if (!wasVisible) {
      popover.classList.add('visible');
      if (btn) btn.classList.add('active');
      if (id === 'popover-prompt') renderPrompt();
      positionPopover(popover, btn);
    }
  }

  function positionPopover(popover, btn) {
    if (!btn) return;
    const toolbar = document.querySelector('.toolbar');
    const toolbarRect = toolbar.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    // Centre du bouton relatif à la toolbar
    const btnCenter = btnRect.left - toolbarRect.left + btnRect.width / 2;

    // Largeur du popover (visible pour mesurer)
    const popWidth = popover.offsetWidth;
    const toolbarWidth = toolbarRect.width;

    // Centrer le popover sur le bouton, clamper dans la toolbar
    let popLeft = btnCenter - popWidth / 2;
    popLeft = Math.max(0, Math.min(popLeft, toolbarWidth - popWidth));
    popover.style.left = popLeft + 'px';

    // Flèche : pointe vers le centre du bouton
    const arrowLeft = btnCenter - popLeft - 7; // 7 = moitié de la flèche (14px)
    popover.style.setProperty('--arrow-left', arrowLeft + 'px');
  }

  function closeAllPopovers() {
    document.querySelectorAll('.popover').forEach(p => p.classList.remove('visible'));
    document.querySelectorAll('.tbtn.active').forEach(b => b.classList.remove('active'));
  }
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.toolbar')) closeAllPopovers();
  });


  // --- Advanced radius ---
  function toggleAdvancedRadius() {
    const adv = document.getElementById('radius-advanced');
    const global = document.getElementById('radius-global');
    adv.classList.toggle('visible');
    global.disabled = adv.classList.contains('visible');
  }

  // --- Helpers lecture de popover ---
  function popValue(popId, index) {
    const inputs = document.querySelectorAll('#' + popId + ' input, #' + popId + ' select');
    return inputs[index];
  }

  // --- Application live sur l'élément démo ---
  function hexToRgba(hex, alpha) {
    if (!hex || hex[0] !== '#') return hex;
    const h = hex.replace('#', '');
    const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
    const r = parseInt(full.substring(0,2),16) || 0;
    const g = parseInt(full.substring(2,4),16) || 0;
    const b = parseInt(full.substring(4,6),16) || 0;
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }
  function applyBg() {
    const pop = document.getElementById('popover-bg');
    const color = pop.querySelector('input[type="text"]').value;
    const opacity = Number(pop.querySelector('input[type="range"]').value);
    elementState.background.color = color;
    elementState.background.opacity = opacity;
    target.style.background = hexToRgba(color, opacity / 100);
  }
  function applyBorder() {
    const inputs = document.querySelectorAll('#popover-border input, #popover-border select');
    const adv = document.getElementById('radius-advanced');
    const width = Number(inputs[0].value); const style = inputs[1].value;
    const radius = adv.classList.contains('visible')
      ? `${inputs[3].value}px ${inputs[4].value}px ${inputs[5].value}px ${inputs[6].value}px`
      : Number(inputs[2].value) + 'px';
    const color = adv.classList.contains('visible') ? inputs[7].value : inputs[7].value;
    elementState.border = { width, style, radius: inputs[2].value, color };
    target.style.borderWidth = width + 'px';
    target.style.borderStyle = style;
    target.style.borderColor = color;
    target.style.borderRadius = radius;
  }
  function applyText() {
    const pop = document.getElementById('popover-text');
    const sel = pop.querySelector('select');
    const nums = pop.querySelectorAll('#text-screen-1 input[type="number"]');
    const colorEl = document.getElementById('tx-color');
    const font = sel.value, size = Number(nums[0].value), line = Number(nums[1].value), color = colorEl.value;
    elementState.text = { font, size, weight: "bold", color };
    target.style.fontFamily = font + ', sans-serif';
    target.style.fontSize = size + 'px';
    target.style.lineHeight = line + 'px';
    target.style.color = color;
  }
  function applySize() {
    const inputs = document.querySelectorAll('#popover-size input[type="number"]');
    const w = Number(inputs[0].value), h = Number(inputs[1].value);
    elementState.size = { width: w, height: h };
    target.style.width = w + 'px';
    target.style.height = h + 'px';
  }
  function clearAll() {
    target.style.cssText = '';
    target.classList.add('selected');
    target.style.background = '#6c5ce7';
    target.style.color = '#fff';
    target.style.border = '2px solid #fff';
    target.style.borderRadius = '8px';
    target.style.padding = '10px 24px';
    flashHint(null, 'Réinitialisé');
  }

  function editSpacing(span) {
    if (span.querySelector('input')) return // déjà en édition
    const current = span.textContent.trim()
    const prop = span.dataset.prop

    const input = document.createElement('input')
    input.type = 'text'
    input.value = current
    span.textContent = ''
    span.appendChild(input)
    input.focus()
    input.select()

    function commit() {
      const val = input.value.trim() || current
      span.textContent = val
      target.style[prop] = val
    }
    input.addEventListener('blur', commit)
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { input.blur() }
      if (e.key === 'Escape') { span.textContent = current }
      e.stopPropagation()
    })
    input.addEventListener('click', e => e.stopPropagation())
  }

  function syncSwatch(id, color) {
    const el = document.getElementById(id);
    if (el) el.style.background = color;
  }

  function syncColorInput(inputId, swatchId, color) {
    const input = document.getElementById(inputId);
    if (input) input.value = color;
    syncSwatch(swatchId, color);
  }

  // --- Prompt generator (lit elementState) ---
  let promptFormat = 'json';
  function renderPrompt() {
    document.getElementById('prompt-content').textContent = generatePrompt();
  }
  function generatePrompt() {
    const e = elementState, b = e.border, t = e.text, s = e.size;
    if (promptFormat === 'json') {
      return JSON.stringify({
        element: e.selector,
        background: { color: e.background.color, opacity: e.background.opacity },
        border: { width: b.width + 'px', style: b.style, radius: b.radius + 'px', color: b.color },
        text: { font: t.font, size: t.size + 'px', weight: t.weight, color: t.color },
        size: { width: s.width + 'px', height: s.height + 'px' }
      }, null, 2);
    }
    return `# Modifications UI — \`${e.selector}\`
- **Background** : ${e.background.color}, opacité ${e.background.opacity}%
- **Border** : ${b.width}px ${b.style}, radius ${b.radius}px, couleur ${b.color}
- **Text** : ${t.font}, ${t.size}px, ${t.weight}, couleur ${t.color}
- **Size** : ${s.width}×${s.height}px`;
  }
  function switchPromptFormat(fmt, btn) {
    promptFormat = fmt;
    document.querySelectorAll('#popover-prompt .toggle-switch button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPrompt();
  }
  function copyNote() {
    const text = document.getElementById('note-input').value.trim()
    if (!text) return
    navigator.clipboard?.writeText(text).catch(() => {})
    flashHint(document.querySelector('#popover-note .btn-accent'), 'Copié ✓')
  }

  function copyPrompt() {
    // Pas d'API clipboard en file:// → feedback visuel simple (prototype).
    flashHint(document.getElementById('btn-copy-prompt'), 'Copié ✓');
  }

  // --- Petit feedback inline ---
  function flashHint(btn, msg) {
    if (!btn) { alert(msg); return; }
    const original = btn.textContent;
    btn.textContent = msg;
    setTimeout(() => { btn.textContent = original; }, 1200);
  }

  // --- Collapse / expand + drag quand collapsed ---
  (function () {
    const toolbar = document.querySelector('.toolbar');
    const logo = document.getElementById('btn-logo');

    // Convertit la position centrée en px avant de collapse
    function lockPosition() {
      const r = toolbar.getBoundingClientRect();
      toolbar.style.left = r.left + 'px';
      toolbar.style.top  = r.top  + 'px';
      toolbar.style.transform = 'none';
      toolbar.style.bottom = 'auto';
    }

    function restoreCenter() {
      toolbar.style.left = '50%';
      toolbar.style.top  = 'auto';
      toolbar.style.bottom = '24px';
      toolbar.style.transform = 'translateX(-50%)';
    }

    logo.addEventListener('click', () => {
      const willCollapse = !toolbar.classList.contains('collapsed');
      closeAllPopovers();
      if (willCollapse) {
        lockPosition();
        toolbar.classList.add('collapsed');
      } else {
        toolbar.classList.remove('collapsed');
        restoreCenter();
      }
    });

    // Drag quand collapsed
    let dragging = false, startX, startY, origLeft, origTop;

    toolbar.addEventListener('mousedown', (e) => {
      if (!toolbar.classList.contains('collapsed')) return;
      if (e.target === logo || logo.contains(e.target)) return; // logo = toggle, pas drag
      dragging = true;
      startX = e.clientX; startY = e.clientY;
      const r = toolbar.getBoundingClientRect();
      origLeft = r.left; origTop = r.top;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      toolbar.style.left = (origLeft + dx) + 'px';
      toolbar.style.top  = (origTop  + dy) + 'px';
    });

    document.addEventListener('mouseup', () => { dragging = false; });
  })();
</script>

</body>

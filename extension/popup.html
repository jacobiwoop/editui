<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1d1d1f;
      color: #e6e6e6;
      width: 240px;
      padding: 16px;
    }
    h1 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .sub { font-size: 11px; color: #888; margin-bottom: 14px; }

    .mode-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #2a2a2e;
      color: #e6e6e6;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .mode-btn:hover { background: #3a3a3e; border-color: #667eea; }
    .mode-btn.active {
      background: rgba(102,126,234,0.15);
      border-color: #667eea;
      color: #fff;
    }
    .mode-btn .icon { font-size: 18px; }
    .mode-btn .label { font-weight: 500; }
    .mode-btn .hint { font-size: 10px; color: #888; margin-top: 2px; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 10px;
      background: #2a2a2e;
      border-radius: 6px;
      font-size: 11px;
      color: #888;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.on { background: #4ade80; }
    .dot.off { background: #ff3b30; }

    .info {
      margin-top: 12px;
      font-size: 10px;
      color: #555;
      line-height: 1.5;
      text-align: center;
    }
    kbd {
      background: #333;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <h1>✦ EditUI</h1>
  <p class="sub">Inspecteur visuel → prompt IA</p>

  <button class="mode-btn" id="toggleBtn">
    <span class="icon">🎯</span>
    <div>
      <div class="label">Mode picker</div>
      <div class="hint">Survolez les éléments, cliquez pour sélectionner</div>
    </div>
  </button>

  <div class="status">
    <span class="dot off" id="statusDot"></span>
    <span id="statusText">Désactivé</span>
  </div>

  <div class="info">
    <kbd>Esc</kbd> désélectionne ·
    Toolbar flottante pour modifier le CSS
  </div>

  <script src="popup.js"></script>
</body>
</html>
